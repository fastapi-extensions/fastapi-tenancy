#####################################################################
# Docs — build and deploy MkDocs to GitHub Pages                    #
#                                                                   #
# • PR       → build only (validate no broken links/strict errors)  #
# • Push main → build + deploy to gh-pages                          #
#####################################################################

name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'src/**'          # API reference may be auto-generated from src
      - 'overrides/**'
      - 'requirements-docs.txt'
      - '*.md'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'overrides/**'
      - 'requirements-docs.txt'
      - '*.md'

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write         # needed for gh-pages push

jobs:
  build:
    name: "Build docs"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history for git-revision-date plugin

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv sync --extra dev
          if [ -f requirements-docs.txt ]; then
            uv pip install -r requirements-docs.txt
          fi

      - name: Build docs (strict — fail on warnings)
        run: uv run mkdocs build --strict --quiet

      - name: Upload built docs as artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: site/
          retention-days: 3

  deploy:
    name: "Deploy to GitHub Pages"
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv sync --extra dev
          if [ -f requirements-docs.txt ]; then
            uv pip install -r requirements-docs.txt
          fi

      - name: Configure git for gh-pages push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy to GitHub Pages
        run: uv run mkdocs gh-deploy --force --quiet
