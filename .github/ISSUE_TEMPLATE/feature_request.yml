name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]

body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this feature solve? What's the current limitation?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this feature work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider?

  - type: textarea
    id: api
    attributes:
      label: Proposed API (if applicable)
      render: python
      description: Show what the new API would look like

  - type: checkboxes
    id: willingness
    attributes:
      label: Contribution
      options:
        - label: I'm willing to submit a PR for this feature
