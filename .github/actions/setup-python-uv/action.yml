name: "Setup Python + uv"
description: "Install uv, set up Python, restore dependency cache, and sync the project."

inputs:
  python-version:
    description: "Python version to use"
    required: false
    default: "3.12"
  extras:
    description: "uv extras to install (e.g. 'dev,docs')"
    required: false
    default: "dev"

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
        enable-cache: true
        cache-dependency-glob: "pyproject.toml"

    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install project + extras
      shell: bash
      run: uv sync --extra ${{ inputs.extras }}
