#################################################################################
# Release — fastapi-tenancy                                                     #
#                                                                               #
# Triggered by pushing a version tag: v1.2.3 / v1.2.3a1 / v1.2.3rc1             #
#                                                                               #
# Pipeline:                                                                     #
#   validate → build → publish-pypi → github-release                            #
#                                                                               #
# Publish uses PyPI Trusted Publishing (OIDC) — no API token needed.            #
# Pre-releases (a/b/rc tags) publish to TestPyPI and create a draft GH release. #
#################################################################################

name: Release

on:
  push:
    tags: ["v[0-9]*.[0-9]*.[0-9]*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false      # Never cancel a release in flight

permissions:
  contents: write
  id-token: write

defaults:
  run:
    shell: bash

jobs:
# Pre-release validation
  validate:
    name: "Validate release"
    runs-on: ubuntu-latest
    outputs:
      version:        ${{ steps.meta.outputs.version }}
      is_prerelease:  ${{ steps.meta.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract release metadata
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Detect pre-release: tag contains a, b, or rc suffix
          if echo "$VERSION" | grep -qE '(a|b|rc)[0-9]+$'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Tag: $TAG  |  Version: $VERSION"

      - name: Verify tag matches pyproject.toml version
        run: |
          PKG_VERSION=$(grep '^version = ' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          TAG_VERSION="${{ steps.meta.outputs.version }}"
          echo "pyproject.toml: $PKG_VERSION  |  tag: $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "✗ Version mismatch — update pyproject.toml before tagging."
            exit 1
          fi

      - name: Verify CHANGELOG entry exists
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          if ! grep -q "\[$VERSION\]" CHANGELOG.md; then
            echo "✗ No CHANGELOG.md entry found for version $VERSION"
            exit 1
          fi

# Smoke test — fast sanity check before building the wheel
  smoke-test:
    name: "Smoke test"
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run unit + integration tests (no live DBs)
        run: |
          uv run pytest tests/ \
            -m "not e2e" \
            --ignore=tests/storage/test_postgres_store.py \
            --ignore=tests/storage/test_mysql_store.py \
            --ignore=tests/storage/test_mssql_store.py \
            --tb=short -q \
            --cov-fail-under=85

# Build
  build:
    name: "Build wheel + sdist"
    runs-on: ubuntu-latest
    needs: [validate, smoke-test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build
        run: uv build

      - name: Verify wheel contents
        run: |
          python3 -c "
          import zipfile, sys, glob
          wheels = glob.glob('dist/*.whl')
          if not wheels:
              sys.exit('No wheel found in dist/')
          with zipfile.ZipFile(wheels[0]) as z:
              names = z.namelist()
          checks = {
              'py.typed marker': any('py.typed' in n for n in names),
              'source files':    any('.py' in n for n in names),
          }
          for label, ok in checks.items():
              status = '✓' if ok else '✗'
              print(f'  {status} {label}')
          failed = [k for k, v in checks.items() if not v]
          if failed:
              sys.exit(f'Wheel validation failed: {failed}')
          print(f'Wheel OK: {wheels[0]}')
          "

      - name: Show distribution sizes
        run: ls -lh dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ needs.validate.outputs.version }}
          path: dist/
          retention-days: 30

# Publish to PyPI (stable) or TestPyPI (pre-release)
  publish-pypi:
    name: "Publish to ${{ needs.validate.outputs.is_prerelease == 'true' && 'TestPyPI' || 'PyPI' }}"
    runs-on: ubuntu-latest
    needs: [validate, build]
    environment:
      name: ${{ needs.validate.outputs.is_prerelease == 'true' && 'testpypi' || 'pypi' }}
      url: >-
        ${{ needs.validate.outputs.is_prerelease == 'true'
            && format('https://test.pypi.org/project/fastapi-tenancy/{0}/', needs.validate.outputs.version)
            || format('https://pypi.org/project/fastapi-tenancy/{0}/', needs.validate.outputs.version) }}
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.validate.outputs.version }}
          path: dist/

      - name: Publish to PyPI (Trusted Publishing / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: >-
            ${{ needs.validate.outputs.is_prerelease == 'true'
                && 'https://upload.test.pypi.org/legacy/'
                || 'https://upload.pypi.org/legacy/' }}
          skip-existing: false
          verbose: true

# GitHub Release
  github-release:
    name: "GitHub Release"
    runs-on: ubuntu-latest
    needs: [validate, publish-pypi]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.validate.outputs.version }}
          path: dist/

      - name: Extract CHANGELOG entry
        id: changelog
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          # Extract the block between this version header and the next one
          NOTES=$(awk "/^## \[$VERSION\]/,/^## \[/{if(/^## \[/ && !/^## \[$VERSION\]/)exit; print}" CHANGELOG.md)
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "fastapi-tenancy ${{ github.ref_name }}"
          body: ${{ steps.changelog.outputs.notes }}
          files: dist/*
          draft: false
          prerelease: ${{ needs.validate.outputs.is_prerelease == 'true' }}
          generate_release_notes: false
