#################################################################################
# CI — fastapi-tenancy                                                          #
#                                                                               #
# Job graph (only triggered jobs run):                                          #
#                                                                               #
#   changes ──┬──► lint        (src | tests | deps | workflows changed)         #
#             ├──► type-check  (src | deps changed)                             #
#             ├──► security    (src | deps changed)                             #
#             ├──► unit        (src | tests | deps changed)  ← no services      #
#             ├──► integration (src | tests | deps changed)  ← SQLite + Redis   #
#             ├──► e2e         (main push OR 'run-e2e' label, PG + MySQL)       #
#             └──► docs-check  (docs | src changed)                             #
#                                                                               #
#################################################################################

name: CI

on:
  push:
    branches: [main, "release/*"]
  pull_request:
    branches: [main, "release/*"]
    types: [opened, synchronize, reopened, labeled]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

# Path change detection
jobs:
  changes:
    name: "Detect changed paths"
    runs-on: ubuntu-latest
    outputs:
      src:       ${{ steps.filter.outputs.src }}
      tests:     ${{ steps.filter.outputs.tests }}
      docs:      ${{ steps.filter.outputs.docs }}
      deps:      ${{ steps.filter.outputs.deps }}
      workflows: ${{ steps.filter.outputs.workflows }}
      code:      ${{ steps.filter.outputs.src == 'true' || steps.filter.outputs.tests == 'true' || steps.filter.outputs.deps == 'true' || steps.filter.outputs.workflows == 'true' }}
      testable:  ${{ steps.filter.outputs.src == 'true' || steps.filter.outputs.tests == 'true' || steps.filter.outputs.deps == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            src:
              - 'src/**'
            tests:
              - 'tests/**'
            docs:
              - 'docs/**'
              - 'mkdocs.yml'
              - '*.md'
              - 'overrides/**'
              - 'requirements-docs.txt'
            deps:
              - 'pyproject.toml'
              - 'uv.lock'
            workflows:
              - '.github/**'

# Lint
  lint:
    name: "Lint (ruff)"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

# Type check
  type-check:
    name: "Type check (mypy)"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.src == 'true' || needs.changes.outputs.deps == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Mypy
        run: uv run mypy src tests

# Security
  security:
    name: "Security (bandit)"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.src == 'true' || needs.changes.outputs.deps == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Bandit scan
        run: uv run bandit -r src/fastapi_tenancy -ll -ii

# Unit tests — no external services
  unit:
    name: "Unit / Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.testable == 'true'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run unit tests (no services)
        run: |
          uv run pytest tests/ \
            -m "unit or (not integration and not e2e)" \
            --ignore=tests/storage/test_postgres_store.py \
            --ignore=tests/storage/test_mysql_store.py \
            --ignore=tests/storage/test_mssql_store.py \
            --ignore=tests/storage/test_redis_store.py \
            --ignore=tests/storage/test_sqla_contract.py \
            --tb=short -q \
            --cov=fastapi_tenancy \
            --cov-report=xml:coverage-unit-py${{ matrix.python-version }}.xml

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage-unit-py3.12.xml
          retention-days: 3

# Integration tests — SQLite + Redis, no PG/MySQL
  integration:
    name: "Integration / Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    needs: [changes, unit]
    if: needs.changes.outputs.testable == 'true'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      REDIS_URL: "redis://localhost:6379/0"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run integration tests (SQLite + Redis)
        run: |
          uv run pytest tests/ \
            -m "not e2e" \
            --ignore=tests/storage/test_postgres_store.py \
            --ignore=tests/storage/test_mysql_store.py \
            --ignore=tests/storage/test_mssql_store.py \
            --tb=short -q \
            --cov=fastapi_tenancy \
            --cov-report=xml:coverage-integration-py${{ matrix.python-version }}.xml

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: coverage-integration-py3.12.xml
          retention-days: 3

# E2E — PostgreSQL
  e2e-postgres:
    name: "E2E / PostgreSQL ${{ matrix.pg-version }}"
    runs-on: ubuntu-latest
    needs: [changes, integration]
    if: |
      needs.changes.outputs.testable == 'true' &&
      (github.event_name == 'push' ||
       contains(github.event.pull_request.labels.*.name, 'run-e2e'))
    strategy:
      fail-fast: false
      matrix:
        pg-version: ["15", "16"]

    services:
      postgres:
        image: postgres:${{ matrix.pg-version }}-alpine
        env:
          POSTGRES_USER: testing
          POSTGRES_PASSWORD: Testing123!
          POSTGRES_DB: test_db
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U testing"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      POSTGRES_URL: "postgresql+asyncpg://testing:Testing123!@localhost:5432/test_db"
      TENANCY_DATABASE_URL: "postgresql+asyncpg://testing:Testing123!@localhost:5432/test_db"
      REDIS_URL: "redis://localhost:6379/0"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run PostgreSQL E2E tests
        run: |
          uv run pytest \
            tests/storage/test_postgres_store.py \
            tests/storage/test_sqla_contract.py \
            tests/isolation/test_schema.py \
            tests/isolation/test_rls.py \
            tests/isolation/test_hybrid.py \
            -m "e2e" \
            --tb=short -v \
            --cov=fastapi_tenancy \
            --cov-report=xml:coverage-e2e-pg${{ matrix.pg-version }}.xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-e2e-postgres-${{ matrix.pg-version }}
          path: coverage-e2e-pg${{ matrix.pg-version }}.xml
          retention-days: 3

# E2E — MySQL
  e2e-mysql:
    name: "E2E / MySQL ${{ matrix.mysql-version }}"
    runs-on: ubuntu-latest
    needs: [changes, integration]
    if: |
      needs.changes.outputs.testable == 'true' &&
      (github.event_name == 'push' ||
       contains(github.event.pull_request.labels.*.name, 'run-e2e'))
    strategy:
      fail-fast: false
      matrix:
        mysql-version: ["8.0"]

    services:
      mysql:
        image: mysql:${{ matrix.mysql-version }}
        env:
          MYSQL_ROOT_PASSWORD: Testing123!
          MYSQL_USER: testing
          MYSQL_PASSWORD: Testing123!
          MYSQL_DATABASE: test_db
        ports: ["3306:3306"]
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u testing --password=Testing123!"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15

    env:
      MYSQL_URL: "mysql+aiomysql://testing:Testing123!@localhost:3306/test_db"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run MySQL E2E tests
        run: |
          uv run pytest \
            tests/storage/test_mysql_store.py \
            -m "e2e" \
            --tb=short -v \
            --cov=fastapi_tenancy \
            --cov-report=xml:coverage-e2e-mysql${{ matrix.mysql-version }}.xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-e2e-mysql-${{ matrix.mysql-version }}
          path: coverage-e2e-mysql${{ matrix.mysql-version }}.xml
          retention-days: 3

# Coverage report
  coverage:
    name: "Upload coverage to Codecov"
    runs-on: ubuntu-latest
    needs: [unit, integration]
    if: always() && needs.unit.result == 'success' && needs.integration.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Download all coverage reports
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          merge-multiple: true
          path: coverage-reports/

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          directory: coverage-reports/
          fail_ci_if_error: false

# Docs build check
  docs-check:
    name: "Docs build"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docs == 'true' || needs.changes.outputs.src == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: |
          uv sync --all-extras
          if [ -f requirements-docs.txt ]; then
            uv pip install -r requirements-docs.txt
          fi

      - name: Build docs (strict)
        run: uv run mkdocs build --strict --quiet

# Required status gate
  ci-pass:
    name: "CI passed ✓"
    runs-on: ubuntu-latest
    needs: [lint, type-check, security, unit, integration, docs-check]
    if: always()
    steps:
      - name: Verify all required jobs passed
        run: |
          declare -A results
          results[lint]="${{ needs.lint.result }}"
          results[type-check]="${{ needs.type-check.result }}"
          results[security]="${{ needs.security.result }}"
          results[unit]="${{ needs.unit.result }}"
          results[integration]="${{ needs.integration.result }}"
          results[docs-check]="${{ needs.docs-check.result }}"

          failed=0
          for job in lint type-check security unit integration docs-check; do
            r="${results[$job]}"
            echo "  $job → $r"
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              failed=1
            fi
          done

          if [[ $failed -eq 1 ]]; then
            echo ""
            echo "✗ One or more required CI jobs failed."
            exit 1
          fi
          echo ""
          echo "✓ All required CI jobs passed or were intentionally skipped."
